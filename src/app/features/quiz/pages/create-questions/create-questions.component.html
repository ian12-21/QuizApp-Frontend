<div class="quiz-header">
  <h1>{{ quizName() }}</h1>
  <span class="question-count">Questions: {{ numberOfQuestions() }}</span>
</div>

<form (ngSubmit)="onSubmit()" class="quiz-form">
  <div class="questions-container">
    @for (questionGroup of questionsForm.controls; track questionGroup; let i = $index) {
      <div class="question-card" [formGroup]="getQuestionGroup(i)">
        <div style="display: flex; flex-direction: column; width: 100%;">
          <h2>Question {{ i + 1 }}</h2>
          <input formControlName="question"
            placeholder="Type your question here">
          <div class="answers-container">
            <div class="answer-input">
              <input formControlName="answer0"
                [placeholder]="'Enter answer A'"
                (input)="onAnswerInput(i, 0)">
              <mat-radio-group formControlName="correctAnswer">
                <mat-radio-button [value]="0"
                  [disabled]="!hasAnswer(i, 0)">
                  Correct Answer
                </mat-radio-button>
              </mat-radio-group>
            </div>
            <div class="answer-input">
              <input formControlName="answer1"
                [placeholder]="'Enter answer B'"
                (input)="onAnswerInput(i, 1)">
              <mat-radio-group formControlName="correctAnswer">
                <mat-radio-button [value]="1"
                  [disabled]="!hasAnswer(i, 1)">
                  Correct Answer
                </mat-radio-button>
              </mat-radio-group>
            </div>
            <div class="answer-input">
              <input formControlName="answer2"
                [placeholder]="'Enter answer C'"
                (input)="onAnswerInput(i, 2)">
              <mat-radio-group formControlName="correctAnswer">
                <mat-radio-button [value]="2"
                  [disabled]="!hasAnswer(i, 2)">
                  Correct Answer
                </mat-radio-button>
              </mat-radio-group>
            </div>
            <div class="answer-input">
              <input formControlName="answer3"
                [placeholder]="'Enter answer D'"
                (input)="onAnswerInput(i, 3)">
              <mat-radio-group formControlName="correctAnswer">
                <mat-radio-button [value]="3"
                  [disabled]="!hasAnswer(i, 3)">
                  Correct Answer
                </mat-radio-button>
              </mat-radio-group>
            </div>
          </div>
          <div class="question-actions">
            <button mat-raised-button
              [color]="isQuestionSaved(i) ? 'accent' : 'primary'"
              type="button"
              (click)="saveQuestion(i)"
              class="save-question-button">
              {{ isQuestionSaved(i) ? 'Update Question' : 'Save Question' }}
            </button>
          </div>
        </div>
      </div>
    }
  </div>

  <button mat-raised-button color="primary" type="submit" class="submit-button">
    Deploy Quiz
  </button>
</form>
