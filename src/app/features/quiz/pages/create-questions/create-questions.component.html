<div class="quiz-header">
  <h1>{{ quizName() }}</h1>
  <span class="question-count">Questions: {{ numberOfQuestions() }}</span>
</div>

<form class="quiz-form">
  <div class="questions-container">
    @for (questionGroup of questionsForm.controls; track questionGroup; let i = $index) {
      <div class="question-card" [formGroup]="getQuestionGroup(i)">
        <div style="display: flex; flex-direction: column; width: 100%;">
          <h2>Question {{ i + 1 }}</h2>
          <input formControlName="question"
            placeholder="Type your question here">
          <div class="answers-container">
            <mat-radio-group formControlName="correctAnswer">
              @for (answerIndex of [0, 1, 2, 3]; track answerIndex) {
                <div class="answer-input">
                  <input [formControlName]="'answer' + answerIndex"
                    [placeholder]="'Enter answer ' + ('ABCD'[answerIndex])"
                    (input)="onAnswerInput(i, answerIndex)">
                  <mat-radio-button
                    [value]="answerIndex"
                    [disabled]="!hasAnswer(i, answerIndex)">
                    Correct Answer
                  </mat-radio-button>
                </div>
              }
            </mat-radio-group>
          </div>
          <div class="question-actions">
            <button mat-raised-button
              [color]="isQuestionSaved(i) ? 'accent' : 'primary'"
              type="button"
              (click)="saveQuestion(i)"
              class="save-question-button">
              {{ isQuestionSaved(i) ? 'Update Question' : 'Save Question' }}
            </button>
          </div>
        </div>
      </div>
    }
  </div>

  <button mat-raised-button color="primary" type="button" (click)="onSubmit()" class="submit-button">
    Deploy Quiz
  </button>
</form>
