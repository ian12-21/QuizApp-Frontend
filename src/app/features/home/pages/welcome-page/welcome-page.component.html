<section class="hero">
  <div class="glow"></div>

  <div class="content">
    <h1 class="title">Quiz<span class="highlight">DApp</span></h1>
    <p class="tagline">Decentralized quizzes on Solana. Create, compete, and earn.</p>

    @if (!walletService.isConnected()) {
      <button mat-flat-button class="cta-button" (click)="connectWallet()">
        {{ walletService.isConnecting() ? 'Connecting...' : 'Connect Wallet' }}
      </button>
      <a class="link" routerLink="/about">Learn more about QuizApp</a>
    }

    @if (walletService.isConnected()) {
      <div class="wallet-badge">
        <span class="dot"></span>
        {{ walletService.shortAddress() }}
      </div>

      <div class="action-cards">
        <button class="action-card" (click)="openCreateQuizDialog()">
          <span class="card-icon">+</span>
          <span class="card-label">Create Quiz</span>
          <span class="card-desc">Design your own quiz</span>
        </button>
        <button class="action-card" (click)="joinQuizDialog()">
          <span class="card-icon">&#9654;</span>
          <span class="card-label">Join Quiz</span>
          <span class="card-desc">Enter with a PIN code</span>
        </button>
      </div>

      <div class="secondary-links">
        <a routerLink="/search-results">Search Quiz & Results</a>
        <a routerLink="/about">About</a>
      </div>
    }
  </div>
</section>
